<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤯 QUANTUM VORTEX - Mind-Blowing 3D Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial Black', sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 24px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
            z-index: 100;
            pointer-events: none;
            text-align: center;
            font-weight: 900;
            letter-spacing: 2px;
        }

        #fps {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #0ff;
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 100;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }
    </style>
</head>

<body>
    <div id="canvas-container"></div>
    <div id="info">🌌 QUANTUM VORTEX 🌌</div>
    <div id="fps">FPS: <span id="fps-val">60</span></div>
    <div id="controls">
        ✨ Move mouse to control colors | Scroll to zoom | Drag to rotate | Click to pulse!
    </div>

    <!-- Import Three.js and dependencies -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ========== SCENE SETUP ==========
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: true,
            powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.5;
        container.appendChild(renderer.domElement);

        // ========== CONTROLS ==========
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2;
        controls.minDistance = 5;
        controls.maxDistance = 50;

        // ========== POST-PROCESSING ==========
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.2,  // strength
            0.4,  // radius
            0.85  // threshold
        );
        composer.addPass(bloomPass);

        // ========== MOUSE TRACKING ==========
        const mouse = new THREE.Vector2();
        const targetHue = new THREE.Vector2(0, 0);
        const currentHue = new THREE.Vector2(0, 0);

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            targetHue.x = (e.clientX / window.innerWidth) * 360;
            targetHue.y = (e.clientY / window.innerHeight) * 180;
        });

        window.addEventListener('click', () => {
            // Pulse effect
            const pulseTime = Date.now();
            const pulseIntensity = 2.0;
            const originalIntensity = light.intensity;

            function pulse() {
                const elapsed = Date.now() - pulseTime;
                if (elapsed < 500) {
                    light.intensity = originalIntensity + pulseIntensity * Math.sin(elapsed / 500 * Math.PI);
                    requestAnimationFrame(pulse);
                } else {
                    light.intensity = originalIntensity;
                }
            }
            pulse();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // ========== LIGHTING ==========
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);

        const light = new THREE.PointLight(0x00ffff, 3, 100);
        light.position.set(5, 5, 5);
        scene.add(light);

        const light2 = new THREE.PointLight(0xff00ff, 2, 100);
        light2.position.set(-5, -5, -5);
        scene.add(light2);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(0, 10, 0);
        scene.add(directionalLight);

        // ========== MAIN OBJECT: QUANTUM VORTEX ==========
        const vortexGroup = new THREE.Group();
        scene.add(vortexGroup);

        // Central torus knot
        const torusKnotGeometry = new THREE.TorusKnotGeometry(2, 0.6, 200, 32, 8, 8);
        const torusKnotMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x00ffff,
            metalness: 0.9,
            roughness: 0.1,
            reflectivity: 1,
            clearcoat: 1,
            clearcoatRoughness: 0.1,
            emissive: 0x001111,
            emissiveIntensity: 0.3,
            wireframe: false,
            side: THREE.DoubleSide
        });
        const torusKnot = new THREE.Mesh(torusKnotGeometry, torusKnotMaterial);
        vortexGroup.add(torusKnot);

        // Outer crystal sphere
        const sphereGeometry = new THREE.SphereGeometry(5, 64, 64);
        const sphereMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x222222,
            metalness: 0.1,
            roughness: 0.1,
            transmission: 0.9,
            thickness: 0.5,
            transparent: true,
            opacity: 0.3,
            side: THREE.DoubleSide,
            wireframe: false
        });
        const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        vortexGroup.add(sphere);

        // Wireframe overlay
        const wireframeGeometry = new THREE.SphereGeometry(4.5, 32, 32);
        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0x00ff00,
            wireframe: true,
            transparent: true,
            opacity: 0.1
        });
        const wireframeSphere = new THREE.Mesh(wireframeGeometry, wireframeMaterial);
        vortexGroup.add(wireframeSphere);

        // Spiral rings
        const ringGeometry = new THREE.TorusGeometry(6, 0.05, 16, 100);
        const ringMaterial = new THREE.MeshBasicMaterial({
            color: 0xff00ff,
            transparent: true,
            opacity: 0.4,
            side: THREE.DoubleSide
        });

        const rings = [];
        for (let i = 0; i < 5; i++) {
            const ring = new THREE.Mesh(ringGeometry, ringMaterial.clone());
            ring.rotation.x = Math.PI * 0.5;
            ring.rotation.z = (i / 5) * Math.PI * 2;
            ring.scale.set(1 + i * 0.3, 1 + i * 0.3, 1 + i * 0.3);
            rings.push(ring);
            vortexGroup.add(ring);
        }

        // ========== PARTICLE SYSTEM ==========
        const particleCount = 5000;
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);

        const colorObj = new THREE.Color();

        for (let i = 0; i < particleCount; i++) {
            const i3 = i * 3;
            // Spherical distribution
            const radius = 8 + Math.random() * 15;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);

            positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i3 + 2] = radius * Math.cos(phi);

            // Initial colors (will be animated)
            colorObj.setHSL(Math.random(), 1, 0.5);
            colors[i3] = colorObj.r;
            colors[i3 + 1] = colorObj.g;
            colors[i3 + 2] = colorObj.b;

            sizes[i] = Math.random() * 2 + 0.5;
        }

        const particlesGeometry = new THREE.BufferGeometry();
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        particlesGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.15,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true
        });

        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);

        // ========== ANIMATION LOOP ==========
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;

        function animate() {
            requestAnimationFrame(animate);

            // FPS counter
            frameCount++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = now;
                document.getElementById('fps-val').textContent = fps;
            }

            // Smooth color transition based on mouse
            currentHue.x += (targetHue.x - currentHue.x) * 0.02;
            currentHue.y += (targetHue.y - currentHue.y) * 0.02;

            const hue = (currentHue.x % 360) / 360;
            const saturation = 0.8;
            const lightness = 0.5;

            colorObj.setHSL(hue, saturation, lightness);

            // Update main object colors
            torusKnotMaterial.color = colorObj;
            torusKnotMaterial.emissive = colorObj.clone().multiplyScalar(0.2);
            light.color.setHSL((hue + 0.5) % 1, 1, 0.5);

            // Rotate elements
            torusKnot.rotation.x += 0.005;
            torusKnot.rotation.y += 0.01;
            wireframeSphere.rotation.x -= 0.003;
            wireframeSphere.rotation.y -= 0.002;

            // Animate rings
            rings.forEach((ring, idx) => {
                ring.rotation.z += 0.002 * (idx + 1);
                ring.rotation.x = Math.PI * 0.5 + Math.sin(Date.now() * 0.001 + idx) * 0.2;
                ring.material.opacity = 0.2 + Math.sin(Date.now() * 0.002 + idx) * 0.2;
            });

            // Animate particles (spiral motion)
            const positions = particles.geometry.attributes.position.array;
            const colors = particles.geometry.attributes.color.array;
            const time = Date.now() * 0.0001;

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const x = positions[i3];
                const y = positions[i3 + 1];
                const z = positions[i3 + 2];

                // Circular + spiral motion
                const radius = Math.sqrt(x * x + y * y);
                const angle = Math.atan2(y, x) + 0.001;
                const newRadius = radius + Math.sin(time + z * 0.1) * 0.05;

                positions[i3] = Math.cos(angle) * newRadius;
                positions[i3 + 1] = Math.sin(angle) * newRadius;
                positions[i3 + 2] = z + Math.sin(time + radius * 0.1) * 0.02;

                // Color cycling
                const particleHue = (hue + i / particleCount + time * 0.1) % 1;
                colorObj.setHSL(particleHue, 0.8, 0.6);
                colors[i3] = colorObj.r;
                colors[i3 + 1] = colorObj.g;
                colors[i3 + 2] = colorObj.b;
            }

            particles.geometry.attributes.position.needsUpdate = true;
            particles.geometry.attributes.color.needsUpdate = true;

            // Pulse sphere on beat
            const pulseScale = 1 + Math.sin(Date.now() * 0.003) * 0.02;
            sphere.scale.set(pulseScale, pulseScale, pulseScale);

            // Update controls
            controls.update();

            // Render
            composer.render();
        }

        animate();
    </script>
</body>

</html>
